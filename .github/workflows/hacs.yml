name: HACS Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Node.js 버전에 대한 경고를 모든 step에서 억제
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
