<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private HACS</title>
<script src="/private_hacs_panel/js/marked.min.js"></script>
<style>
  :root {
    --primary: #03a9f4;
    --primary-dark: #0288d1;
    --success: #4caf50;
    --warning: #ff9800;
    --danger: #f44336;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --surface3: #3a3a3c;
    --text: #e5e5ea;
    --text-secondary: #98989f;
    --border: #3a3a3c;
    --radius: 12px;
    --radius-sm: 8px;
    --github-bg: #0d1117;
    --github-border: #30363d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

  .header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #7c4dff); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header-actions { display: flex; gap: 8px; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface3); color: var(--text); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { filter: brightness(1.1); }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-warning:hover { filter: brightness(1.1); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  .main { max-width: 1100px; margin: 0 auto; padding: 24px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  .filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar input { flex: 1; min-width: 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 14px; color: var(--text); font-size: 14px; }
  .filter-bar input:focus { outline: none; border-color: var(--primary); }
  .filter-tabs { display: flex; gap: 4px; }
  .tab-btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all .15s; }
  .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .repo-grid { display: flex; flex-direction: column; gap: 12px; }
  .repo-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 16px; transition: border-color .15s; }
  .repo-card:hover { border-color: var(--primary); }
  .repo-card.has-update { border-left: 3px solid var(--warning); }
  
  /* 아이콘 컨테이너 스타일 */
  .repo-icon { 
    width: 48px; height: 48px; flex-shrink: 0; 
    background: linear-gradient(135deg, var(--primary), #7c4dff); 
    border-radius: 12px; display: flex; align-items: center; justify-content: center; 
    font-size: 22px; cursor: pointer; overflow: hidden;
  }
  .repo-icon img { width: 32px; height: 32px; object-fit: contain; }
  
  .repo-info { flex: 1; min-width: 0; }
  
  .repo-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; display: inline-block; cursor: pointer; color: var(--text); transition: color .15s; text-decoration: underline; text-decoration-color: transparent; }
  .repo-name:hover { color: var(--primary); text-decoration-color: var(--primary); }
  
  .repo-repo { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
  .repo-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .repo-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-installed { background: rgba(76,175,80,.2); color: var(--success); }
  .badge-update { background: rgba(255,152,0,.2); color: var(--warning); }
  .badge-not-installed { background: var(--surface3); color: var(--text-secondary); }
  .badge-version { background: var(--surface3); color: var(--text-secondary); font-family: monospace; }
  .badge-manifest { background: rgba(124,77,255,.2); color: #b39ddb; }

  .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none; }
  .toast { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; min-width: 260px; pointer-events: auto; animation: slideIn .25s ease; display: flex; align-items: center; gap: 10px; }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error   { border-left: 3px solid var(--danger); }
  .toast.info    { border-left: 3px solid var(--primary); }
  .toast.warning { border-left: 3px solid var(--warning); }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: none; opacity:1; } }

  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 500; align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #1c1c1e;
    border: 1px solid #3a3a3c;
    border-radius: var(--radius); padding: 28px;
    width: 90%; max-width: 480px;
    box-shadow: 0 8px 32px rgba(0,0,0,.8);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
  }
  
  #readmeModal .modal {
    max-width: 800px;
    width: 95%;
    height: 85vh;
  }

  .readme-content {
    flex: 1; overflow-y: auto; background: var(--github-bg); border: 1px solid var(--github-border);
    border-radius: var(--radius-sm); padding: 32px; color: #c9d1d9; font-size: 14px; line-height: 1.6;
  }
  .markdown-body h1, .markdown-body h2, .markdown-body h3 { border-bottom: 1px solid var(--github-border); padding-bottom: 8px; margin-top: 24px; margin-bottom: 16px; color: #f0f6fc; }
  .markdown-body h1:first-child { margin-top: 0; }
  .markdown-body a { color: #58a6ff; text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }
  .markdown-body code { background: rgba(110,118,129,0.4); padding: 0.2em 0.4em; border-radius: 6px; font-family: monospace; font-size: 85%; }
  .markdown-body pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  .markdown-body pre code { background: none; padding: 0; font-size: 100%; color: #e6edf3; }
  .markdown-body img { max-width: 100%; border-radius: 8px; }
  .markdown-body blockquote { border-left: 4px solid #30363d; margin: 0; padding-left: 16px; color: #8b949e; }
  .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
  .markdown-body th, .markdown-body td { border: 1px solid var(--github-border); padding: 8px 12px; }
  .markdown-body th { background: #161b22; color: #f0f6fc; }
  .markdown-body tr:nth-child(2n) { background: #161b22; }

  .modal h2 { font-size: 18px; margin-bottom: 20px; color: #e5e5ea; flex-shrink: 0; }
  .modal-field { margin-bottom: 14px; flex-shrink: 0; }
  .modal-field label { display: block; font-size: 12px; color: #98989f; margin-bottom: 5px; }
  .modal-field input {
    width: 100%; background: #2c2c2e;
    border: 1px solid #3a3a3c; border-radius: var(--radius-sm);
    padding: 9px 12px; color: #e5e5ea; font-size: 13px;
  }
  .modal-field input:focus { outline: none; border-color: var(--primary); }
  .modal-field .hint { font-size: 11px; color: #98989f; margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: auto; flex-shrink: 0; }

  .repo-preview { display: none; background: #2c2c2e; border-radius: var(--radius-sm); padding: 12px; margin-top: 10px; font-size: 12px; border: 1px solid #3a3a3c; }
  .repo-preview.visible { display: block; }
  .repo-preview-name { font-weight: 600; margin-bottom: 4px; color: #e5e5ea; }
  .repo-preview-desc { color: #98989f; }
  .repo-preview-component { color: var(--primary); font-family: monospace; margin-top: 6px; }

  .confirm-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 600; align-items: center; justify-content: center;
  }
  .confirm-backdrop.open { display: flex; }
  .confirm-box {
    background: #1c1c1e;
    border: 1px solid #3a3a3c;
    border-radius: var(--radius); padding: 28px;
    width: 90%; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,.8);
  }
  .confirm-box h3 { margin-bottom: 12px; color: #e5e5ea; }
  .confirm-box p { font-size: 14px; color: #98989f; margin-bottom: 20px; line-height: 1.5; white-space: pre-line; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

  @media (max-width: 600px) {
    .repo-card { flex-direction: column; align-items: flex-start; }
    .repo-actions { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">🔒</div>
    <h1>Private HACS</h1>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="refreshAll()" id="refreshBtn">🔄 새로고침</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">＋ 저장소 추가</button>
  </div>
</div>

<div class="main">
  <div class="stats" id="stats" style="display:none">
    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">전체 저장소</div></div>
    <div class="stat-card"><div class="stat-number" id="statInstalled">0</div><div class="stat-label">설치됨</div></div>
    <div class="stat-card"><div class="stat-number" id="statUpdates" style="color:var(--warning)">0</div><div class="stat-label">업데이트 가능</div></div>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none">
    <input type="text" placeholder="저장소 검색..." id="searchInput" oninput="renderRepos()">
    <div class="filter-tabs">
      <button class="tab-btn active" onclick="setTab('all',this)">전체</button>
      <button class="tab-btn" onclick="setTab('installed',this)">설치됨</button>
      <button class="tab-btn" onclick="setTab('updates',this)">업데이트</button>
      <button class="tab-btn" onclick="setTab('not_installed',this)">미설치</button>
    </div>
  </div>

  <div class="repo-grid" id="repoGrid">
    <div class="loading"><div class="spinner"></div><div>저장소 정보 불러오는 중...</div></div>
  </div>
</div>

<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <h2>저장소 추가</h2>
    <div class="modal-field">
      <label>GitHub 저장소 *</label>
      <input id="addRepo" placeholder="owner/repo-name 또는 https://github.com/owner/repo" autocomplete="off" oninput="handleRepoInput(event)">
      <div class="hint">전체 URL 또는 owner/repo-name 형식 모두 지원</div>
      <div class="repo-preview" id="repoPreview">
        <div class="repo-preview-name" id="previewName"></div>
        <div class="repo-preview-desc" id="previewDesc"></div>
        <div class="repo-preview-component" id="previewComponent"></div>
      </div>
    </div>
    <div class="modal-field">
      <label>기본 브랜치 <span style="color:#98989f">(선택, 기본값: main)</span></label>
      <input id="addBranch" placeholder="main" value="main" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">취소</button>
      <button class="btn btn-primary" onclick="submitAddRepo()" id="addSubmitBtn" disabled>추가</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="readmeModal">
  <div class="modal">
    <h2 id="readmeTitle">저장소 정보</h2>
    <div class="readme-content" id="readmeContent">
      <div class="loading"><div class="spinner"></div><div>README 불러오는 중...</div></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeReadmeModal()">닫기</button>
    </div>
  </div>
</div>

<div class="confirm-backdrop" id="confirmBackdrop">
  <div class="confirm-box">
    <h3 id="confirmTitle">확인</h3>
    <p id="confirmMsg"></p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">취소</button>
      <button class="btn btn-danger" id="confirmOkBtn">확인</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
var repos = [];
var activeTab = 'all';
var busyComponents = new Set();
var _pendingRepoInfo = null;
var _repoLookupTimer = null;
var $el = function(id) { 
  return window.__privateHacsPanel ? window.__privateHacsPanel.querySelector('#' + id) : document.getElementById(id); 
};

async function getToken() {
  if (typeof window.__privateHacsGetToken === 'function') {
    return window.__privateHacsGetToken();
  }
  return Promise.reject(new Error('패널이 올바르게 로드되지 않았습니다.'));
}

var ws = null;
var msgId = 1;
var pending = {};

async function connectWS() {
  const token = await getToken();
  return new Promise((resolve, reject) => {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(proto + '://' + location.host + '/api/websocket');
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'auth_required') {
        ws.send(JSON.stringify({ type: 'auth', access_token: token }));
      } else if (msg.type === 'auth_ok') {
        resolve();
      } else if (msg.type === 'auth_invalid') {
        reject(new Error('HA 인증 실패'));
      } else if (msg.id && pending[msg.id]) {
        pending[msg.id](msg);
        delete pending[msg.id];
      }
    };
    ws.onerror = () => reject(new Error('WebSocket 연결 오류'));
  });
}

function wsSend(msg) {
  return new Promise((resolve) => {
    const id = msgId++;
    pending[id] = resolve;
    ws.send(JSON.stringify(Object.assign({}, msg, { id: id })));
  });
}

async function callService(domain, service, data) {
  return wsSend({ type: 'call_service', domain: domain, service: service, service_data: data });
}

var UID_PREFIX = 'private_hacs_';

async function fetchRepos() {
  const results = await Promise.all([
    wsSend({ type: 'get_states' }),
    wsSend({ type: 'config/entity_registry/list' }),
  ]);
  const states = results[0].result || [];
  const reg = results[1].result || [];

  const entityToInfo = {};
  reg
    .filter(function(e) { return e.platform === 'private_hacs'; })
    .forEach(function(e) { 
        let compId = e.unique_id;
        if (compId && compId.indexOf('private_hacs_') === 0) {
            compId = compId.substring('private_hacs_'.length);
        } else if (compId && compId.indexOf(UID_PREFIX) === 0) {
            compId = compId.substring(UID_PREFIX.length);
        } else if (compId && compId.indexOf('repo_') === 0) {
            compId = compId.substring('repo_'.length);
        }
        entityToInfo[e.entity_id] = compId;
    });

  return states
    .filter(function(s) { return s.entity_id.indexOf('update.') === 0 && entityToInfo[s.entity_id]; })
    .map(function(s) {
      const a = s.attributes;
      const componentId = entityToInfo[s.entity_id];
      const installed = a.installed_version || null;
      const latest = a.latest_version || null;
      const hasUpdate = s.state === 'on';
      
      const rawName = a.friendly_name || s.entity_id;
      let cleanName = rawName.replace(/ update$/i, '');
      if (cleanName.indexOf('Private HACS ') === 0) {
          cleanName = cleanName.substring('Private HACS '.length);
      }

      let repoUrl = '';
      if (a.release_url) {
        const match = a.release_url.match(/github\.com\/([^\/]+\/[^\/]+)/);
        if (match) repoUrl = match[1].replace(/\/(tree|releases|commits).*$/, '');
      }
      
      return {
        entity_id: s.entity_id,
        component_id: componentId,
        name: cleanName,
        repo_url: repoUrl,
        installed_version: installed,
        latest_version: latest,
        release_url: a.release_url || null,
        has_update: hasUpdate,
        is_installed: !!installed,
        version_source: a.version_source || (installed ? 'store' : 'none'),
        latest_type: a.latest_type || null,
        // ⭐ 백엔드 속성에서 아이콘 존재 여부 추출
        has_icon: a.has_icon || false,
      };
    });
}

async function loadData() {
  try {
    repos = await fetchRepos();
  } catch (err) {
    toast('데이터 로드 실패: ' + err.message, 'error', 8000);
    $el('repoGrid').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><p>데이터를 불러오지 못했습니다.<br>' + err.message + '</p></div>';
    return;
  }
  $el('stats').style.display = 'grid';
  $el('filterBar').style.display = 'flex';
  renderAll();
}

function renderAll() { updateStats(); renderRepos(); }

function updateStats() {
  $el('statTotal').textContent = repos.length;
  $el('statInstalled').textContent = repos.filter(function(r) { return r.is_installed; }).length;
  $el('statUpdates').textContent = repos.filter(function(r) { return r.has_update; }).length;
}

function setTab(tab, btn) {
  activeTab = tab;
  (window.__privateHacsPanel || document).querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderRepos();
}

function filteredRepos() {
  const q = ($el('searchInput') ? $el('searchInput').value : '').toLowerCase();
  return repos.filter(function(r) {
    const matchQ = !q || r.name.toLowerCase().indexOf(q) >= 0 || r.component_id.indexOf(q) >= 0;
    const matchTab =
      activeTab === 'installed' ? r.is_installed :
      activeTab === 'updates' ? r.has_update :
      activeTab === 'not_installed' ? !r.is_installed : true;
    return matchQ && matchTab;
  });
}

function renderRepos() {
  const list = filteredRepos();
  const grid = $el('repoGrid');
  if (list.length === 0) {
    grid.innerHTML = repos.length === 0
      ? '<div class="empty"><div class="empty-icon">📦</div><p>등록된 저장소가 없습니다.<br>우상단 <b>＋ 저장소 추가</b> 버튼으로 추가하세요.</p></div>'
      : '<div class="empty"><div class="empty-icon">🔍</div><p>검색 결과가 없습니다.</p></div>';
    return;
  }
  grid.innerHTML = list.map(repoCardHTML).join('');
}

function repoCardHTML(r) {
  const busy = busyComponents.has(r.component_id);
  const cardClass = r.has_update ? 'repo-card has-update' : 'repo-card';

  const statusBadge = r.is_installed
    ? (r.has_update ? '<span class="badge badge-update">⬆ 업데이트 가능</span>' : '<span class="badge badge-installed">✓ 최신</span>')
    : '<span class="badge badge-not-installed">미설치</span>';

  const sourceBadge = r.version_source === 'manifest'
    ? '<span class="badge badge-manifest" title="manifest.json에서 자동 감지됨">📄 자동 감지</span>' : '';

  const installedBadge = r.installed_version
    ? '<span class="badge badge-version">설치: ' + esc(r.installed_version) + '</span>' : '';
  const latestBadge = r.has_update && r.latest_version
    ? '<span class="badge badge-version">최신: ' + esc(r.latest_version) + '</span>' : '';

  const linkLabel = r.latest_type === 'branch' ? '커밋 로그 ↗' : '릴리즈 노트 ↗';
  const releaseLink = r.release_url
    ? '<a href="' + esc(r.release_url) + '" target="_blank" style="font-size:11px;color:var(--primary);text-decoration:none">' + linkLabel + '</a>' : '';

  // ⭐ 아이콘 렌더링 로직
  const iconContent = r.has_icon 
    ? '<img src="/private_hacs_icons/' + r.component_id + '/brand/icon.png" onerror="this.outerHTML=\'🧩\'">'
    : '🧩';

  let actions = '';
  if (busy) {
    actions = '<button class="btn btn-primary btn-sm" disabled>⏳ 처리 중...</button>';
  } else if (!r.is_installed) {
    actions = [
      '<button class="btn btn-success btn-sm" onclick="install(\'' + esc(r.component_id) + '\',\'' + esc(r.name) + '\')">⬇ 설치</button>',
      '<button class="btn btn-danger btn-sm" onclick="removeRepo(\'' + esc(r.component_id) + '\',\'' + esc(r.name) + '\')">등록 해제</button>',
    ].join('');
  } else if (r.has_update) {
    actions = [
      '<button class="btn btn-warning btn-sm" onclick="install(\'' + esc(r.component_id) + '\',\'' + esc(r.name) + '\')">⬆ 업데이트</button>',
      '<button class="btn btn-danger btn-sm" onclick="uninstall(\'' + esc(r.component_id) + '\',\'' + esc(r.name) + '\')">컴포넌트 삭제</button>',
      '<button class="btn btn-ghost btn-sm" onclick="removeRepo(\'' + esc(r.component_id) + '\',\'' + esc(r.name) + '\')">등록 해제</button>',
    ].join('');
  } else {
    actions = [
      '<button class="btn btn-ghost btn-sm" onclick="install(\'' + esc(r.component_id) + '\',\'' + esc(r.name) + '\')">🔄 재설치</button>',
      '<button class="btn btn-danger btn-sm" onclick="uninstall(\'' + esc(r.component_id) + '\',\'' + esc(r.name) + '\')">컴포넌트 삭제</button>',
      '<button class="btn btn-ghost btn-sm" onclick="removeRepo(\'' + esc(r.component_id) + '\',\'' + esc(r.name) + '\')">등록 해제</button>',
    ].join('');
  }

  const clickHandler = r.repo_url ? 'onclick="openReadmeModal(\'' + esc(r.repo_url) + '\', \'' + esc(r.name) + '\')"' : '';

  return '<div class="' + cardClass + '" id="card-' + r.component_id + '">'
    + '<div class="repo-icon" ' + clickHandler + '>' + iconContent + '</div>'
    + '<div class="repo-info">'
    + '<div class="repo-name" title="README 보기" ' + clickHandler + '>' + esc(r.name) + '</div>'
    + '<div class="repo-meta" style="margin-top:6px;">' + statusBadge + sourceBadge + installedBadge + latestBadge + releaseLink + '</div>'
    + '</div>'
    + '<div class="repo-actions">' + actions + '</div>'
    + '</div>';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function install(componentId, name) {
  busyComponents.add(componentId); renderRepos();
  toast(name + ' 설치/업데이트 중...', 'info');
  try {
    await callService('private_hacs', 'install', { component_id: componentId });
    toast(name + ' 설치 완료! HA를 재시작해야 적용됩니다.', 'success', 6000);
    repos = await fetchRepos(); renderAll();
  } catch (err) {
    toast('설치 실패: ' + err.message, 'error', 6000);
  } finally {
    busyComponents.delete(componentId); renderRepos();
  }
}

async function uninstall(componentId, name) {
  showConfirm('컴포넌트 삭제',
    name + ' 컴포넌트를 삭제하시겠습니까?\n\n저장소 등록은 유지됩니다.\n삭제 후 HA를 재시작해야 완전히 제거됩니다.',
    async function() {
      busyComponents.add(componentId); renderRepos();
      toast(name + ' 컴포넌트 삭제 중...', 'info');
      try {
        await callService('private_hacs', 'uninstall', { component_id: componentId });
        toast(name + ' 삭제 완료. HA를 재시작하세요.', 'success', 6000);
        repos = await fetchRepos(); renderAll();
      } catch (err) {
        toast('삭제 실패: ' + err.message, 'error', 6000);
      } finally {
        busyComponents.delete(componentId); renderRepos();
      }
    });
}

async function removeRepo(componentId, name) {
  showConfirm('저장소 등록 해제',
    name + '을(를) Private HACS에서 제거하시겠습니까?\n\n설치된 파일은 자동으로 삭제되지 않습니다.\n나중에 다시 등록하면 기존 설치 정보가 복원됩니다.',
    async function() {
      toast(name + ' 등록 해제 중...', 'info');
      try {
        await callService('private_hacs', 'remove_repo', { component_id: componentId });
        toast(name + ' 등록 해제 완료.', 'success');
        repos = repos.filter(function(r) { return r.component_id !== componentId; });
        renderAll();
      } catch (err) {
        toast('등록 해제 실패: ' + err.message, 'error', 6000);
      }
    });
}

async function refreshAll() {
  const btn = $el('refreshBtn');
  btn.disabled = true; btn.textContent = '⏳ 새로고침 중...';
  toast('버전 정보 새로고침 중...', 'info');
  try {
    await callService('private_hacs', 'refresh', {});
    await new Promise(function(r) { setTimeout(r, 2000); });
    repos = await fetchRepos(); renderAll();
    toast('새로고침 완료', 'success');
  } catch (err) {
    toast('새로고침 실패: ' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '🔄 새로고침';
  }
}

async function openReadmeModal(repoUrl, name) {
  $el('readmeTitle').textContent = name;
  $el('readmeContent').innerHTML = '<div class="loading"><div class="spinner"></div><div>README 불러오는 중...</div></div>';
  $el('readmeModal').classList.add('open');

  try {
    const res = await wsSend({
      type: 'call_service',
      domain: 'private_hacs',
      service: 'get_readme',
      service_data: { repo: repoUrl },
      return_response: true,
    });

    if (res.error) throw new Error(res.error.message || '조회 실패');
    
    const info = (res.result && res.result.response) || res.response || res.result || {};
    const content = info.content || "README 내용이 없습니다.";
    
    if (window.marked && typeof marked.parse === 'function') {
        marked.setOptions({ gfm: true, breaks: true });
        $el('readmeContent').innerHTML = '<div class="markdown-body">' + marked.parse(content) + '</div>';
    } else {
        $el('readmeContent').innerHTML = '<pre style="white-space: pre-wrap;">' + esc(content) + '</pre>';
    }

  } catch (err) {
    $el('readmeContent').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>README를 불러오지 못했습니다.<br>' + err.message + '</p></div>';
  }
}

function closeReadmeModal() {
  $el('readmeModal').classList.remove('open');
}

function _parseRepoInput(val) {
  val = val.trim();
  const urlMatch = val.match(/github\.com\/([a-zA-Z0-9_\-]+\/[a-zA-Z0-9_\-\.]+)/);
  if (urlMatch) return urlMatch[1].replace(/\.git$/, '');
  if (/^[a-zA-Z0-9_\-]+\/[a-zA-Z0-9_\-\.]+$/.test(val)) return val;
  return null;
}

function openAddModal() {
  _pendingRepoInfo = null;
  $el('addRepo').value = '';
  $el('addBranch').value = 'main';
  $el('repoPreview').classList.remove('visible');
  $el('addSubmitBtn').disabled = true;
  $el('addModal').classList.add('open');
  setTimeout(function() { var el = $el('addRepo'); if (el) el.focus(); }, 50);
}

function closeAddModal() {
  $el('addModal').classList.remove('open');
  _pendingRepoInfo = null;
}

function handleRepoInput(e) {
  const repo = _parseRepoInput(e.target.value);
  $el('repoPreview').classList.remove('visible');
  $el('addSubmitBtn').disabled = true;
  _pendingRepoInfo = null;
  clearTimeout(_repoLookupTimer);
  if (!repo) return;
  _repoLookupTimer = setTimeout(function() { lookupRepo(repo); }, 800);
}

async function lookupRepo(repo) {
  $el('repoPreview').classList.add('visible');
  $el('previewName').textContent = '조회 중...';
  $el('previewDesc').textContent = '';
  $el('previewComponent').textContent = '';
  $el('addSubmitBtn').disabled = true;
  _pendingRepoInfo = null;

  try {
    const res = await wsSend({
      type: 'call_service',
      domain: 'private_hacs',
      service: 'get_repo_info',
      service_data: { repo: repo },
      return_response: true,
    });

    if (res.error) throw new Error(res.error.message || '조회 실패');

    const info = (res.result && res.result.response) || res.response || {};
    const componentIds = info.component_ids || [];
    const componentId = componentIds.length >= 1
      ? componentIds[0]
      : repo.split('/')[1].replace(/-/g, '_').toLowerCase();

    _pendingRepoInfo = {
      repo: repo,
      name: info.name || repo.split('/')[1],
      component_id: componentId,
      branch: info.default_branch || 'main',
    };

    $el('previewName').textContent = info.full_name || repo;
    $el('previewDesc').textContent = info.description || '';
    $el('previewComponent').textContent = componentIds.length > 1
      ? 'component_id: ' + componentId + ' (' + componentIds.join(', ') + ' 중 첫 번째)'
      : 'component_id: ' + componentId;
    $el('addSubmitBtn').disabled = false;

  } catch (err) {
    $el('previewName').textContent = '조회 실패: ' + err.message;
    $el('previewDesc').textContent = '';
    $el('previewComponent').textContent = '';
  }
}

async function submitAddRepo() {
  if (!_pendingRepoInfo) {
    toast('저장소 주소를 입력하고 잠시 기다려주세요.', 'warning'); return;
  }

  const branch = ($el('addBranch').value || '').trim() || _pendingRepoInfo.branch;
  const repo = _pendingRepoInfo.repo;
  const name = _pendingRepoInfo.name;
  const component_id = _pendingRepoInfo.component_id;

  const btn = $el('addSubmitBtn');
  btn.disabled = true; btn.textContent = '추가 중...';
  try {
    await callService('private_hacs', 'add_repo', {
      repo: repo, name: name, component_id: component_id, branch: branch,
    });
    closeAddModal();
    toast(name + ' 저장소가 추가됐습니다. 버전 정보를 가져오는 중...', 'success', 5000);
    await new Promise(function(r) { setTimeout(r, 3000); });
    repos = await fetchRepos(); renderAll();
  } catch (err) {
    toast('저장소 추가 실패: ' + err.message, 'error', 6000);
    btn.disabled = false; btn.textContent = '추가';
  }
}

function showConfirm(title, msg, cb) {
  $el('confirmTitle').textContent = title;
  $el('confirmMsg').textContent = msg;
  $el('confirmOkBtn').onclick = function() { closeConfirm(); cb(); };
  $el('confirmBackdrop').classList.add('open');
}
function closeConfirm() { $el('confirmBackdrop').classList.remove('open'); }

function toast(msg, type, duration) {
  type = type || 'info';
  duration = duration || 3500;
  const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>';
  $el('toastContainer').appendChild(el);
  setTimeout(function() { el.remove(); }, duration);
}

if (!window._privateHacsKeydown) {
  window._privateHacsKeydown = true;
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (typeof closeAddModal === 'function') closeAddModal();
      if (typeof closeReadmeModal === 'function') closeReadmeModal();
      if (typeof closeConfirm === 'function') closeConfirm();
    }
  });
}

(async function() {
  try {
    await connectWS();
    await loadData();
  } catch (err) {
    $el('repoGrid').innerHTML =
      '<div class="empty"><div class="empty-icon">🔌</div>'
      + '<p>' + err.message + '<br>'
      + '<button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="location.reload()">새로고침</button></p></div>';
  }
})();
</script>
</body>
